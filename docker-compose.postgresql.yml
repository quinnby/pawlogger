---

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: "pawlog"
      POSTGRES_PASSWORD: "pawlog_dev"
      POSTGRES_DB: "pawlog"
    volumes:
      - postgres:/var/lib/postgresql/
      - /etc/localtime:/etc/localtime:ro

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      POSTGRES_CONNECTION: "Host=postgres:5432;Username=pawlog;Password=pawlog_dev;Database=pawlog;"
    # volumes used to keep data persistent
    volumes:
      - data:/App/data
      - keys:/root/.aspnet/DataProtection-Keys
    # expose port and/or use serving via traefik
    ports:
      - 8080:8080

volumes:
  data:
  keys:
  postgres:
